<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Diario R.G.L.</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style-rdrgl.css">
</head>
<body>
    <div class="form-sales">
        <label>Descripción de la venta</label>
        <input id="input-description" placeholder="Descripción">
        <label>Monto</label>
        <input id="input-amount" type="number" placeholder="$0.00">
        <label>Método de pago</label>
        <div class="cmb">
            <select id="payment-method-form">
                <option value="1">Efectivo</option>
                <option value="2">Tarjeta</option>
                <option value="3">Yappy</option>
                <option value="4">Yappy Comercial</option>
                <option value="5">Transferencia</option>
            </select>
            <i class='bx bx-chevron-down'></i>
        </div>
        <div class="div-percentage">
            <label>Porcentaje de impuesto</label>
            <input id="input-percentage" type="number" placeholder="5%">
        </div>
        <button id="btn-add-sale">Agregar Venta</button>
        <div class="div-cash-withdrawal">
            <label>Retiro de caja</label>
            <input id="input-cash-withdrawal" type="number" placeholder="$0.00">
            <button id="btn-cash-withdrawal">Retirar</button>
        </div>
        <div class="div-cash-add">
            <label>Añadir a caja</label>
            <input id="input-cash-add" type="number" placeholder="$0.00">
            <button id="btn-cash-add">Añadir</button>
        </div>
        <div class="div-previous-cash">
            <label>Saldo de caja del día anterior</label>
            <input id="input-prev-cash" type="number" placeholder="$0.00" disabled="true">
            <button id="btn-prev-cash-edit"><i class="bx bx-pencil"></i></button>
            <button id="btn-prev-cash-check"><i class="bx bx-check"></i></button>
        </div>
        <div class="div-dashboard">
            <span class="span-title">Dashboard Ventas</span>
            <table class="table-dashboard">
                <tr class="tr-titles">
                    <th>Descripción</th>
                    <th>Monto</th>
                    <th class="th-payment-method">
                        <span>Método de pago</span>
                        <div class="cmb">
                            <select id="payment-method-table">
                            <option value="1">Ver todo</option>
                            <option value="2">Efectivo</option>
                            <option value="3">Tarjeta</option>
                            <option value="4">Yappy</option>
                            <option value="5">Yappy Comercial</option>
                            <option value="6">Transferencia</option>
                            </select>
                            <i class='bx bx-chevron-down'></i>
                        </div>
                    </th>
                </tr>
            </table>
            <textarea class="textarea-whatsapp-format"></textarea>
            <button id="btn-whatsapp-format">Cierre Del Dia</button>
        </div>
    </div>
    <script src="script-rdrgl.js"></script>
</body>
</html>
