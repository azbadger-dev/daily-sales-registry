<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Diario R.G.L.</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles/dsr-style.css">
</head>
<body>
    <main>
        <section class="section-entry">
            <div class="div-elements-primary">
                <label class="label-custom" for="description-input">Descripción de la venta</label>
                <input class="input-field" id="description-input" placeholder="Descripción">
            </div>
            <div class="div-elements-primary">
                <label class="label-custom" for="amount-input">Monto</label>
                <input class="input-field" id="amount-input" type="number" placeholder="$0.00">
            </div>
            <div class="div-elements-primary">
                <label class="label-custom" for="payment-method-entry">Método de pago</label>
                <div class="cmb">
                    <select id="payment-method-entry">
                        <option value="1">Efectivo</option>
                        <option value="2">Tarjeta</option>
                        <option value="3">Yappy</option>
                        <option value="4">Yappy Comercial</option>
                        <option value="5">Transferencia</option>
                    </select>
                    <i class='bx bx-chevron-down'></i>
                </div>
            </div>
            <div class="div-percentage div-elements-primary">
                <label class="label-custom" for="percentage-input">Porcentaje de impuesto</label>
                <input class="input-field" id="percentage-input" type="number" placeholder="5%">
            </div>
            <button class="btn-custom btn-primary" id="add-sale-btn">Agregar Venta</button>
            <div class="div-elements-secondary">
                <label class="label-custom" for="cash-withdrawal-input">Retiro de caja</label>
                <input class="input-field" id="cash-withdrawal-input" type="number" placeholder="$0.00">
                <button class="btn-custom btn-secondary" id="cash-withdrawal-btn">Retirar</button>
            </div>
            <div class="div-elements-secondary">
                <label class="label-custom" for="cash-add-input">Añadir a caja</label>
                <input class="input-field" id="cash-add-input" type="number" placeholder="$0.00">
                <button class="btn-custom btn-secondary" id="cash-add-btn">Añadir</button>
            </div>
            <div class="div-elements-secondary">
                <label class="label-custom" for="prev-cash-input">Saldo de caja del día anterior</label>
                <input class="input-field" id="prev-cash-input" type="number" placeholder="$0.00" disabled="true">
                <button class="btn-custom btn-round" id="prev-cash-edit-btn"><i class="bx bx-pencil"></i></button>
                <button class="btn-custom btn-round" id="prev-cash-save-btn"><i class="bx bx-check"></i></button>
            </div>
        </section>
        <section class="section-dashboard">
            <span class="span-title">Dashboard Ventas</span>
            <div class="div-dashboard-table" id="dashboard-table">
                <div class="header-dashboard header-description">Descripción</div>
                <div class="header-dashboard header-amount">Monto</div>
                <div class="header-dashboard header-payment-method">
                    <span>Método de pago</span>
                    <div class="cmb dashboard-cmb">
                        <select id="payment-method-table">
                        <option value="1">Ver todo</option>
                        <option value="2">Efectivo</option>
                        <option value="3">Tarjeta</option>
                        <option value="4">Yappy</option>
                        <option value="5">Yappy Comercial</option>
                        <option value="6">Transferencia</option>
                        </select>
                        <i class='bx bx-chevron-down'></i>
                    </div>
                </div>
                <div class="sale-content">
                    <span>Call of Duty</span>
                    <span>$20</span>
                    <span>Transferencia</span>
                    <button class="btn-trash"><i class="bx bx-trash"></i></button>
                </div>
                <div class="sale-content">
                    <div>Super Mario Party</div>
                    <div>$49</div>
                    <div>Tarjeta</div>
                    <button class="btn-trash"><i class="bx bx-trash"></i></button>
                </div>
                <div class="total-title">Total</div>
                <div class="total-amount">$0</div>
            </div>
            <div class="div-dashboard-cards">
                <div class="dashboard-cmb-cards">
                    <span>Filtro:</span>
                    <div class="cmb dashboard-cmb">
                        <select id="payment-method-cards">
                        <option value="1">Ver todo</option>
                        <option value="2">Efectivo</option>
                        <option value="3">Tarjeta</option>
                        <option value="4">Yappy</option>
                        <option value="5">Yappy Comercial</option>
                        <option value="6">Transferencia</option>
                        </select>
                        <i class='bx bx-chevron-down'></i>
                    </div>
                </div>
                <div class="dashboard-cards">
                    <label class="label-description">Descripción:</label>
                    <span class="span-description">Call of Duty</span>
                    <label class="label-amount">Monto:</label>
                    <span class="span-amount">$20</span>
                    <label class="label-payment-method">Método de pago:</label>
                    <span class="span-payment-method">Transferencia</span>
                    <button class="btn-trash"><i class="bx bx-trash"></i></button>
                </div>
                <div class="dashboard-cards">
                    <label class="label-description">Descripción:</label>
                    <span class="span-description">Super Mario Party</span>
                    <label class="label-amount">Monto:</label>
                    <span class="span-amount">$49</span>
                    <label class="label-payment-method">Método de pago:</label>
                    <span class="span-payment-method">Tarjeta</span>
                    <button class="btn-trash"><i class="bx bx-trash"></i></button>
                </div>
                <div class="dashboard-card-total">
                    <label>Total</label>
                    <span>$0</span>
                </div>
            </div>
            <div class="div-dashboard-output">
                <label class="label-custom" for="report-output-textarea">Formato de WhatsApp</label>
                <textarea class="textarea-custom" id="report-output-textarea"></textarea>
                <button class="btn-custom btn-primary" id="report-output-btn">Cierre Del Día</button>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="scripts/dsr-script.js"></script>
</body>
</html>
